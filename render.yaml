services:
  - type: web
    name: huddle-hub
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SPORTRADAR_API_KEY
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: MATCH_SYNC_ENABLED
        value: "false"
